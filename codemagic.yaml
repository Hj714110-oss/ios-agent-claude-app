workflows:
  ios-workflow:
    name: iOS Agent IDE Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    
    environment:
      vars:
        XCODE_SCHEME: "AgentIDEApp"
      xcode: latest
    
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: 'main'
          include: true
          source: true
        - pattern: 'master'
          include: true
          source: true
    
    scripts:
      - name: Install XcodeGen
        script: |
          brew install xcodegen
      
      - name: Generate Xcode Project
        script: |
          rm -rf AgentIDE.xcodeproj
          xcodegen generate
      
      - name: List Available Schemes
        script: |
          xcodebuild -list -project AgentIDE.xcodeproj
      
      - name: Build
        script: |
          xcodebuild \
            -project AgentIDE.xcodeproj \
            -scheme "$XCODE_SCHEME" \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -derivedDataPath build \
            build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
    
    artifacts:
      - build/Build/Products/**/*.app
