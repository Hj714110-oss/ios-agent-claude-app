name: AgentIDE
options:
  minimumXcodeGenVersion: 2.38.0
  deploymentTarget:
    iOS: "17.0"
configs:
  StoreProfile-Debug: debug
  StoreProfile-Release: release
  OpenProfile-Debug: debug
  OpenProfile-Release: release
configFiles: {}
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.example.AgentIDE
    SWIFT_VERSION: 5.10
    TARGETED_DEVICE_FAMILY: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_CFBundleDisplayName: AgentIDE
    INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
  configs:
    StoreProfile-Debug:
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: STORE_PROFILE DEBUG
    StoreProfile-Release:
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: STORE_PROFILE
    OpenProfile-Debug:
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: OPEN_PROFILE DEBUG
    OpenProfile-Release:
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: OPEN_PROFILE
packages:
  Runestone:
    url: https://github.com/simonbs/Runestone
    from: 0.7.0
  SwiftLibGit2:
    url: https://github.com/swift-developer-tools/swift-libgit2
    from: 0.4.0
targets:
  AgentIDEApp:
    type: application
    platform: iOS
    sources:
      - path: AgentIDEApp
    settings:
      base:
        INFOPLIST_FILE: AgentIDEApp/Info.plist
    dependencies:
      - package: Runestone
      - package: SwiftLibGit2
    scheme:
      testTargets:
        - AgentIDEAppTests
      configVariants:
        - StoreProfile
        - OpenProfile
  AgentIDEAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: AgentIDEAppTests
    dependencies:
      - target: AgentIDEApp
